server:
  port: 8080

spring:
  application:
    name: chaturbate-dvr
  datasource:
    url: jdbc:h2:./data/dvr;AUTO_RECONNECT=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# MyBatis Configuration
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.chaturbate.dvr.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Logging
logging:
  level:
    com.chaturbate.dvr: DEBUG
    org.apache.ibatis: ERROR
    com.chaturbate.dvr.mapper: ERROR
    org.mybatis: ERROR
    org.apache.ibatis.session.defaults.DefaultSqlSession: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
